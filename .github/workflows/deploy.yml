name: Deploy to Hostinger

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS dependencies
        run: npm install

      - name: Build frontend assets
        run: npm run build

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "app,bootstrap,config,database,public,resources,routes,storage,artisan,composer.json,composer.lock,.env.example"
          target: "~/domains/candys-commande.skopee.fr/public_html/"
          overwrite: true

      - name: Run post-deploy commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e
            cd "$HOME/domains/candys-commande.skopee.fr/public_html"
            echo "1. PWD=$(pwd)"
            echo "2. .env exists? $([ -f .env ] && echo YES || echo NO)"
            echo "3. .env.example exists? $([ -f .env.example ] && echo YES || echo NO)"
            echo "4. artisan exists? $([ -f artisan ] && echo YES || echo NO)"
            ls -la .env .env.example artisan 2>&1 || true
            echo "5. php version: $(php -v 2>&1 | head -1)"
            echo "6. composer version: $(composer --version 2>&1 | head -1)"

            if [ ! -f .env ]; then
              echo "7. Creating .env from .env.example"
              cp .env.example .env
              echo "8. Generating app key"
              php artisan key:generate --force
            else
              echo "7. .env already exists, fixing APP_NAME if needed"
              grep "^APP_NAME=" .env || true
              sed -i "s/^APP_NAME=\(Candys Commande\)$/APP_NAME=\"\1\"/" .env
              grep "^APP_NAME=" .env || true
            fi

            echo "9. Running composer install"
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "10. Running migrations"
            php artisan migrate --force
            echo "11. Caching config/route/view"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            echo "12. Linking storage"
            rm -rf public/storage
            ln -snf "$(pwd)/storage/app/public" "$(pwd)/public/storage"
            echo "Deploy complete"