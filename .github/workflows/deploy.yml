name: Deploy to Hostinger

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS dependencies
        run: npm install

      - name: Build frontend assets
        run: npm run build

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "app,bootstrap,config,database,public,resources,routes,storage,artisan,composer.json,composer.lock,.env.example"
          target: "~/domains/candys-commande.skopee.fr/public_html/"
          overwrite: true

      - name: Run post-deploy commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e
            DOMAIN_DIR="$HOME/domains/candys-commande.skopee.fr"
            if [ ! -d "$DOMAIN_DIR" ]; then
              echo "Dossier du domaine introuvable: $DOMAIN_DIR"
              exit 1
            fi
            cd "$DOMAIN_DIR/public_html"
            APP_PATH="$(pwd)"
            echo "Resolved APP_PATH=$APP_PATH"
            composer install --no-dev --optimize-autoloader --no-interaction
            if [ ! -f .env ]; then
              cp .env.example .env
              php artisan key:generate --force
            fi
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            rm -rf public/storage
            ln -snf "$APP_PATH/storage/app/public" "$APP_PATH/public/storage"
            echo "Deploy complete"